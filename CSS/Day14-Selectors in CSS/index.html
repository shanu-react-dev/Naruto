<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectors</title>
    <link rel="stylesheet" href="./style.css" />

    <style>
      h1 {
        color: pink !important; /*It will make the specific css property having the highest priority*/
      }

      #heading {
        color: aqua;
      }
    </style>
  </head>
  <body>
    <h1 id="heading" style="color: blue">Hii this is CSS Selectors</h1>
  </body>
</html>
