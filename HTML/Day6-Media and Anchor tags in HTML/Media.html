<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Media tags in HTML</h1>
    <!-- relatie URL or Path -->
    <img src="./first.jpg" alt="" height="200px" width="100px" />
    <!-- Absolute URL or Path -->
    <img
      src="https://i.pinimg.com/736x/c2/01/50/c201505a4025aac71dd0afa08e5e4344.jp"
      alt="coke"
      height="200px"
    />

    <img
      src="https://cdn.pixabay.com/photo/2026/05/27/04/29/04-29-48-584_1280.jpg"
      alt=""
      height="200px"
    />

    <video
      src="./page4.mp4"
      height="200px"
      width="300px"
      controls
      autoplay
      loop
      muted
    ></video>

    <audio src="./myaudio.mp3" controls autoplay loop muted></audio>
  </body>
</html>
