<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables in HTMl</title>
  </head>
  <body>
    <center>
      <table border="1" cellpadding="30" cellspacing="15">
        <caption>
          User Data
        </caption>

        <!-- Heading part -->
        <thead>
          <tr>
            <th>Sl. No.</th>
            <th>User Name</th>
            <th>Age</th>
            <th>Gender</th>
          </tr>
        </thead>

        <!-- Body Data -->
        <tbody>
          <tr>
            <td>1</td>
            <td>Mohiadeen</td>
            <td>21</td>
            <td>Male</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Keerthikeshan</td>
            <td>21</td>
            <td>Male</td>
          </tr>
          <tr>
            <td>3</td>
            <td>Sugashini</td>
            <td>21</td>
            <td>Female</td>
          </tr>
          <tr>
            <td>4</td>
            <td>Shanu</td>
            <td>24</td>
            <td>Male</td>
          </tr>
        </tbody>
      </table>
    </center>
  </body>
</html>
